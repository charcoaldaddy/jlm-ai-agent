[package]
name = "oap-core-rust"
version = "1.0.0"
edition = "2021"
authors = ["Omni-Agent Protocol Team <team@omni-agent.ai>"]
description = "High-performance Rust runtime for Omni-Agent Protocol"
license = "MIT OR Apache-2.0"
repository = "https://github.com/omni-agent-protocol/oap-core-rust"
documentation = "https://docs.omni-agent.ai/oap-core-rust"

[features]
default = ["runtime", "ml"]
runtime = ["tokio/rt-multi-thread", "async-trait"]
ml = ["burn", "candle"]

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
borsh = "1.3"
capnp = "0.20"

# Cryptography
ethers = { version = "2.0", optional = true }
solana-sdk = { version = "1.18", optional = true }
ed25519-dalek = { version = "2.0", features = ["rand_core"] }
sha2 = "0.10"
aes-gcm = "0.10"
rand = "0.8"
zeroize = { version = "1.7", features = ["derive"] }

# Networking
reqwest = { version = "0.11", features = ["json"] }
tokio-tungstenite = "0.21"
url = "2.5"
http = "1.1"

# Logging & Metrics
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
metrics = "0.21"
prometheus-client = "0.22"

# Database
rocksdb = { version = "0.21", optional = true }
redis = { version = "0.24", features = ["tokio-comp"] }
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "rustls"], optional = true }

# ML (optional)
burn = { version = "0.12", optional = true }
candle = { version = "0.4", optional = true }

# Utilities
thiserror = "1.0"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
base64 = "0.21"
hex = "0.4"
once_cell = "1.19"
parking_lot = "0.12"

[dev-dependencies]
tokio-test = "0.4"
proptest = "1.4"
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3.8"
mockall = "0.12"

[[bench]]
name = "core_benchmarks"
harness = false

[lib]
name = "oap_core"
path = "src/lib.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
